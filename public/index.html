<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){try{var t=localStorage.getItem('nlem-theme');if(t==='dark')document.documentElement.classList.add('dark');var px=localStorage.getItem('nlem-font-px');if(px)document.documentElement.style.fontSize=parseInt(px,10)+'px';}catch(e){}})();
</script>
<title>บัญชียาหลักแห่งชาติ (NLEM) — โรงพยาบาลสงฆ์</title>
<style>
:root {
  --teal:   #1D9E75; --teal-bg:   #E1F5EE; --teal-text:   #085041;
  --blue:   #378ADD; --blue-bg:   #E6F1FB; --blue-text:   #0C447C;
  --purple: #7F77DD; --purple-bg: #EEEDFE; --purple-text: #3C3489;
  --amber:  #EF9F27; --amber-bg:  #FAEEDA; --amber-text:  #633806;
  --green:  #639922; --green-bg:  #EAF3DE; --green-text:  #27500A;
  --coral:  #D85A30; --coral-bg:  #FAECE7; --coral-text:  #712B13;
  --gray: #f5f5f4; --border: #e5e5e3; --text: #1c1c1a; --muted: #6b6b68;
  --font: 'Sarabun', sans-serif;
  --page-bg: #fafaf9;
  --surface: #ffffff;
  --input-bg: #ffffff;
  color-scheme: light;
}
html { font-size: 15px; }
html.dark {
  color-scheme: dark;
  --page-bg: #141413;
  --surface: #1e1e1c;
  --input-bg: #2a2927;
  --gray: #2a2927;
  --border: #40403c;
  --text: #f4f4f2;
  --muted: #a8a8a5;
  --teal-bg: #134032;
  --teal-text: #9fe1cb;
  --blue-bg: #1a3050;
  --blue-text: #b5d4f4;
  --purple-bg: #2d2850;
  --purple-text: #cecbf6;
  --amber-bg: #4a3a1a;
  --amber-text: #fac775;
  --green-bg: #2a3d1f;
  --green-text: #c0dd97;
  --coral-bg: #4a2a22;
  --coral-text: #f5c4b3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--page-bg); color: var(--text); font-size: 1rem; }
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap');

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; }
.header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.font-tools {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
}
.font-tools button {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 8px;
  background: var(--gray);
  color: var(--text);
  cursor: pointer;
  font-weight: 700;
  font-size: 0.85rem;
  font-family: inherit;
  line-height: 1;
}
.font-tools button:hover:not(:disabled) { opacity: 0.85; }
.font-tools button:disabled { opacity: 0.35; cursor: not-allowed; }
.font-label { font-size: 0.75rem; color: var(--muted); min-width: 3rem; text-align: center; }
.theme-btn {
  width: 40px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 1.15rem;
  line-height: 1;
}
.theme-btn:hover { border-color: var(--teal); }
header h1 { font-size: 1.2rem; font-weight: 600; color: var(--teal); }
header p  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.admin-link { font-size: 0.8rem; color: var(--muted); text-decoration: none; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); }
.admin-link:hover { color: var(--text); border-color: #aaa; }

.controls { max-width: 900px; margin: 1.25rem auto; padding: 0 1rem; display: flex; gap: 10px; flex-wrap: wrap; }
.controls input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.933rem; font-family: var(--font); background: var(--input-bg); color: var(--text); }
.controls input:focus { outline: none; border-color: var(--teal); }

.filter-row { max-width: 900px; margin: 0 auto .5rem; padding: 0 1rem; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
.pill { font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; font-family: var(--font); }
.pill.active { background: var(--teal); color: #fff; border-color: var(--teal); }
.pill:hover:not(.active) { border-color: var(--teal); color: var(--teal); }
.group-select { font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--input-bg); color: var(--muted); font-family: var(--font); cursor: pointer; outline: none; max-width: 220px; }
.group-select:focus { border-color: var(--teal); color: var(--text); }
.group-select.active { border-color: var(--teal); background: var(--teal-bg); color: var(--teal-text); }

.grid { max-width: 900px; margin: 0 auto; padding: 0 1rem 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; transition: border-color .15s; }
.card:hover { border-color: #bbb; }
.card.hidden { display: none; }
.card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.badge { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 600; flex-shrink: 0; }
.card-title { font-size: 1rem; font-weight: 600; }
.card-sub   { font-size: 0.733rem; color: var(--muted); margin-top: 2px; }
.card-desc  { font-size: 0.867rem; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
.rights-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.right-tag  { font-size: 0.733rem; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.rt-uc    { background: var(--teal-bg);   color: var(--teal-text); }
.rt-sso   { background: var(--blue-bg);   color: var(--blue-text); }
.rt-csmbs { background: var(--purple-bg); color: var(--purple-text); }
.divider  { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.doc-badge  { display: inline-flex; font-size: 0.733rem; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
.doc-none     { background: var(--green-bg);  color: var(--green-text); }
.doc-partial  { background: var(--amber-bg);  color: var(--amber-text); }
.doc-required { background: var(--coral-bg);  color: var(--coral-text); }
.doc-form-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.doc-form-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 0.733rem; padding: 4px 10px; border-radius: 6px; border: 1px solid; text-decoration: none; font-weight: 500; transition: opacity .15s; }
.doc-form-btn:hover { opacity: .75; }
.doc-form-btn.pdf { background: #FEF2F2; color: #B91C1C; border-color: #FECACA; }
.doc-form-btn.forms { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
.toggle-btn { font-size: 0.8rem; background: none; border: none; cursor: pointer; color: var(--muted); margin-top: 6px; padding: 0; font-family: var(--font); }
.toggle-btn:hover { color: var(--text); }
.drug-list { display: none; margin-top: 8px; }
.drug-list.open { display: block; }
.drug-group-label { font-size: 0.733rem; color: var(--muted); margin: 6px 0 3px; }
.chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.chip { font-size: 0.733rem; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); background: var(--gray); }
.chip-link { font-size: 0.733rem; padding: 2px 8px; border-radius: 20px; border: 1px solid #BFDBFE; color: #1D4ED8; background: #EFF6FF; text-decoration: none; transition: opacity .15s; }
.chip-link:hover { opacity: .75; }
.chip-multi { font-size: 0.733rem; padding: 2px 8px; border-radius: 20px; border: 1px solid #BFDBFE; color: #1D4ED8; background: #EFF6FF; display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.multi-doc-link { font-size: 0.667rem; padding: 1px 6px; border-radius: 10px; background: #1D4ED8; color: #fff; text-decoration: none; transition: opacity .15s; }
.multi-doc-link:hover { opacity: .8; }
.level-tag { font-size: 0.733rem; color: var(--muted); margin-top: 6px; }
.count-label { max-width: 900px; margin: 0 auto .5rem; padding: 0 1rem; font-size: 0.8rem; color: var(--muted); }
.no-result { text-align: center; padding: 3rem; color: var(--muted); grid-column: 1/-1; display: none; }


.loading { text-align: center; padding: 3rem; color: var(--muted); grid-column: 1/-1; }
.error-msg { background: var(--coral-bg); color: var(--coral-text); padding: 1rem; border-radius: 8px; font-size: 0.867rem; grid-column: 1/-1; }

.links-section { max-width: 900px; margin: 0 auto 2.5rem; padding: 0 1rem; }
.links-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.links-title { font-size: 0.933rem; font-weight: 600; color: var(--text); }
.links-subtitle { font-size: 0.8rem; color: var(--muted); }
.links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.link-card { display: flex; align-items: flex-start; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-decoration: none; transition: border-color .15s; }
.link-card:hover { border-color: var(--teal); }
.link-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--teal-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
.link-body { min-width: 0; }
.link-title { font-size: 0.867rem; font-weight: 500; color: var(--text); margin-bottom: 2px; line-height: 1.4; }
.link-host { font-size: 0.733rem; color: var(--teal); }
.link-desc { font-size: 0.733rem; color: var(--muted); margin-top: 3px; line-height: 1.4; }

html.dark .chip-link {
  background: rgba(59, 130, 246, 0.18);
  color: #93c5fd;
  border-color: #3b82f6;
}
html.dark .chip-multi {
  background: rgba(59, 130, 246, 0.18);
  color: #93c5fd;
  border-color: #3b82f6;
}
html.dark .doc-form-btn.pdf { background: #3f1f1f; color: #fecaca; border-color: #991b1b; }
html.dark .doc-form-btn.forms { background: #1e3a5f; color: #bfdbfe; border-color: #1d4ed8; }
html.dark .chip { background: var(--gray); border-color: var(--border); color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>บัญชียาหลักแห่งชาติ (NLEM)</h1>
      <p>ข้อมูลสิทธิการรักษา · เอกสารที่ต้องใช้ · รายการยาแต่ละบัญชี — โรงพยาบาลสงฆ์</p>
    </div>
    <div class="header-actions">
      <div class="font-tools" title="ขนาดตัวอักษร">
        <button type="button" class="font-down" onclick="adjustFont(-1)" aria-label="ลดขนาดตัวอักษร">A−</button>
        <span class="font-label font-pct">100%</span>
        <button type="button" class="font-up" onclick="adjustFont(1)" aria-label="เพิ่มขนาดตัวอักษร">A+</button>
      </div>
      <button type="button" class="theme-btn" onclick="toggleTheme()" title="โหมดสี">🌙</button>
      <a href="admin.html" class="admin-link">Admin</a>
    </div>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="ค้นหายา เช่น imatinib, warfarin, ฟ้าทะลายโจร..." oninput="filterCards()">
</div>
<div class="filter-row">
  <span class="filter-label">กรองสิทธิ:</span>
  <button class="pill active" onclick="setRight(this,'ALL')">ทั้งหมด</button>
  <button class="pill" onclick="setRight(this,'UC')">บัตรทอง (UC)</button>
  <button class="pill" onclick="setRight(this,'SSO')">ประกันสังคม</button>
  <button class="pill" onclick="setRight(this,'CSMBS')">ข้าราชการ</button>
  <button class="pill" onclick="setRight(this,'DOC')">ต้องมีเอกสาร</button>
</div>
<div class="filter-row">
  <span class="filter-label">กรองกลุ่มยา:</span>
  <select id="group-filter" class="group-select" onchange="setGroup(this)">
    <option value="">— ทั้งหมด —</option>
  </select>
</div>

<p class="count-label" id="count-label">กำลังโหลด...</p>

<div class="grid" id="card-grid">
  <div class="loading">กำลังโหลดข้อมูลจากฐานข้อมูล...</div>
</div>

<div class="links-section" id="links-section" style="display:none">
  <div class="links-header">
    <span class="links-title">แหล่งข้อมูลและแบบฟอร์มทางการ</span>
    <span class="links-subtitle">— ข้อมูลสิทธิ NLEM อ้างอิงจากแหล่งราชการ</span>
  </div>
  <div class="links-grid" id="links-grid"></div>
</div>

<script>

const FONT = { min: 13, max: 22, def: 15 };

function getFontPx() {
  const raw = localStorage.getItem('nlem-font-px');
  if (raw == null) return FONT.def;
  const n = parseInt(raw, 10);
  return Number.isFinite(n) ? Math.max(FONT.min, Math.min(FONT.max, n)) : FONT.def;
}

function setFontPx(px) {
  px = Math.max(FONT.min, Math.min(FONT.max, px));
  document.documentElement.style.fontSize = px + 'px';
  localStorage.setItem('nlem-font-px', String(px));
  syncFontUi();
}

function adjustFont(delta) {
  setFontPx(getFontPx() + delta);
}

function syncFontUi() {
  const px = getFontPx();
  const pct = Math.round((px / FONT.def) * 100);
  document.querySelectorAll('.font-pct').forEach(el => { el.textContent = pct + '%'; });
  document.querySelectorAll('.font-down').forEach(el => { el.disabled = px <= FONT.min; });
  document.querySelectorAll('.font-up').forEach(el => { el.disabled = px >= FONT.max; });
}

function toggleTheme() {
  const html = document.documentElement;
  const dark = !html.classList.contains('dark');
  html.classList.toggle('dark', dark);
  localStorage.setItem('nlem-theme', dark ? 'dark' : 'light');
  syncThemeBtn();
}

function syncThemeBtn() {
  const dark = document.documentElement.classList.contains('dark');
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.textContent = dark ? '☀️' : '🌙';
    btn.title = dark ? 'โหมดสว่าง' : 'โหมดมืด';
  });
}

function initDisplayPrefs() {
  document.documentElement.style.fontSize = getFontPx() + 'px';
  syncFontUi();
  syncThemeBtn();
}

const COLOR_BADGE = {
  teal:   { bg: '#9FE1CB', color: '#085041' },
  blue:   { bg: '#B5D4F4', color: '#0C447C' },
  purple: { bg: '#CECBF6', color: '#3C3489' },
  amber:  { bg: '#FAC775', color: '#633806' },
  green:  { bg: '#C0DD97', color: '#27500A' },
  coral:  { bg: '#F5C4B3', color: '#712B13' },
};
const DOC_BADGE = {
  none:     { cls: 'doc-none',     label: 'ไม่ต้องมีเอกสารพิเศษ' },
  partial:  { cls: 'doc-partial',  label: 'เอกสารบางกรณี' },
  required: { cls: 'doc-required', label: 'ต้องมีเอกสาร (ทุกกรณี)' },
};
const RIGHTS_MAP = { UC: 'บัตรทอง UC', SSO: 'ประกันสังคม', CSMBS: 'ข้าราชการ CSMBS' };
const RIGHTS_CLS = { UC: 'rt-uc', SSO: 'rt-sso', CSMBS: 'rt-csmbs' };

let cats = [], drugs = [], links = [], drugGroups = [];
let activeRight = 'ALL';
let activeGroup = '';

const LINK_ICONS = {
  'ndp.fda.moph.go.th': '💊',
  'drug.fda.moph.go.th': '🔍',
  'nhso.go.th': '🏥',
  'drug.nhso.go.th': '🏥',
  'sso.go.th': '👷',
  'cgd.go.th': '📋',
};

async function load() {
  try {
    [cats, drugs, links, drugGroups] = await Promise.all([
      fetch('/api/categories').then(r => r.json()),
      fetch('/api/drugs').then(r => r.json()),
      fetch('/api/links').then(r => r.json()),
      fetch('/api/drug-groups').then(r => r.json()),
    ]);
    populateGroupFilter();
    renderAll();
    renderLinks();
  } catch (e) {
    document.getElementById('card-grid').innerHTML =
      `<div class="error-msg">โหลดข้อมูลไม่สำเร็จ: ${e.message}</div>`;
  }
}

function populateGroupFilter() {
  const sel = document.getElementById('group-filter');
  sel.innerHTML = '<option value="">— ทั้งหมด —</option>' +
    drugGroups.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
}

function renderLinks() {
  if (!links.length) return;
  const sec  = document.getElementById('links-section');
  const grid = document.getElementById('links-grid');
  sec.style.display = 'block';
  grid.innerHTML = links.map(l => {
    let host = '';
    try { host = new URL(l.url).hostname.replace('www.', ''); } catch {}
    const icon = LINK_ICONS[host] || '🔗';
    return `
      <a class="link-card" href="${l.url}" target="_blank" rel="noopener">
        <div class="link-icon">${icon}</div>
        <div class="link-body">
          <div class="link-title">${l.title}</div>
          <div class="link-host">${host}</div>
          ${l.description ? `<div class="link-desc">${l.description}</div>` : ''}
        </div>
      </a>`;
  }).join('');
}

function renderAll() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';

  cats.forEach(cat => {
    const catDrugs  = drugs.filter(d => d.category_id === cat.id);
    const badge     = COLOR_BADGE[cat.color] || COLOR_BADGE.teal;
    const doc       = DOC_BADGE[cat.doc_level] || DOC_BADGE.none;
    const rightList = (cat.rights || '').split(',').filter(Boolean);
    const cardBorder = ['required','partial'].includes(cat.doc_level) && cat.doc_level === 'required'
      ? 'border-color:#F5C4B3'  : '';

    // group drugs
    const groups = {};
    catDrugs.forEach(d => {
      const g = d.drug_group || 'อื่นๆ';
      if (!groups[g]) groups[g] = [];
      groups[g].push(d);
    });

    // build drug html
    let drugHtml = '';
    Object.entries(groups).forEach(([g, list]) => {
      drugHtml += `<p class="drug-group-label">${g}</p><div class="chips">`;
      list.forEach(d => {
        const label = d.name_th ? `${d.name_en} (${d.name_th})` : d.name_en;
        if (d.doc_url) {
          let urls = [];
          try { urls = JSON.parse(d.doc_url); if (!Array.isArray(urls)) urls = [d.doc_url]; }
          catch { urls = [d.doc_url]; }
          if (urls.length === 1) {
            drugHtml += `<a class="chip chip-link" href="${urls[0]}" target="_blank" rel="noopener" title="ดูเอกสาร / แบบฟอร์ม">📄 ${label}</a>`;
          } else {
            drugHtml += `<span class="chip chip-multi">📄 ${label}`;
            urls.forEach((u, i) => {
              drugHtml += `<a href="${u}" target="_blank" rel="noopener" class="multi-doc-link">เอกสาร ${i + 1}</a>`;
            });
            drugHtml += `</span>`;
          }
        } else {
          drugHtml += `<span class="chip">${label}</span>`;
        }
      });
      drugHtml += '</div>';
    });

    const searchText = [cat.name_th, cat.name_en, cat.description,
      catDrugs.map(d => `${d.name_en} ${d.name_th || ''} ${d.drug_group || ''}`).join(' ')
    ].join(' ').toLowerCase();

    const groupsInCard = [...new Set(catDrugs.map(d => d.drug_group).filter(Boolean))];

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.rights = rightList.join(' ');
    card.dataset.doc    = cat.doc_level || 'none';
    card.dataset.text   = searchText;
    card.dataset.groups = groupsInCard.join('||');
    if (cardBorder) card.style.cssText = cardBorder;

    card.innerHTML = `
      <div class="card-header">
        <div class="badge" style="background:${badge.bg};color:${badge.color}">${cat.id}</div>
        <div>
          <div class="card-title">${cat.name_th}</div>
          <div class="card-sub">${cat.name_en}</div>
        </div>
      </div>
      <p class="card-desc">${cat.description || ''}</p>
      <div class="rights-row">
        ${rightList.map(r => `<span class="right-tag ${RIGHTS_CLS[r] || ''}">${RIGHTS_MAP[r] || r}</span>`).join('')}
      </div>
      <hr class="divider">
      <button class="toggle-btn" onclick="toggleDrugs(this)">▸ ตัวอย่างยาในบัญชีนี้ (${catDrugs.length} รายการ)</button>
      <div class="drug-list">${drugHtml}</div>
      <div class="doc-form-row">
        <span class="doc-badge ${doc.cls}">${doc.label}</span>
        ${cat.doc_url ? `
        <a class="doc-form-btn pdf"
           href="${cat.doc_url}" target="_blank" rel="noopener">
          📄 เอกสาร / แบบฟอร์ม
        </a>` : ''}
      </div>
      <p class="level-tag">ระดับบริการ: ${cat.level_desc || ''}</p>
    `;
    grid.appendChild(card);
  });

  filterCards();
}


function toggleDrugs(btn) {
  const list = btn.nextElementSibling;
  list.classList.toggle('open');
  const count = btn.textContent.match(/\d+/)?.[0] || '';
  btn.textContent = list.classList.contains('open')
    ? `▾ ซ่อนรายการยา (${count} รายการ)`
    : `▸ ตัวอย่างยาในบัญชีนี้ (${count} รายการ)`;
}

function setRight(el, val) {
  activeRight = val;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  filterCards();
}

function setGroup(sel) {
  activeGroup = sel.value;
  sel.classList.toggle('active', !!activeGroup);
  filterCards();
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const rights     = card.dataset.rights || '';
    const doc        = card.dataset.doc    || '';
    const text       = card.dataset.text   || '';
    const cardGroups = card.dataset.groups || '';

    let rm = true;
    if      (activeRight === 'UC')    rm = rights.includes('UC');
    else if (activeRight === 'SSO')   rm = rights.includes('SSO');
    else if (activeRight === 'CSMBS') rm = rights.includes('CSMBS');
    else if (activeRight === 'DOC')   rm = doc === 'required' || doc === 'partial';

    const gm = !activeGroup || cardGroups.split('||').includes(activeGroup);
    const sm = !q || text.includes(q) || card.textContent.toLowerCase().includes(q);

    if (rm && gm && sm) { card.classList.remove('hidden'); visible++; }
    else                { card.classList.add('hidden'); }
  });
  const label = document.getElementById('count-label');
  label.textContent = `แสดง ${visible} บัญชี`;
  const noRes = document.querySelector('.no-result');
  if (noRes) noRes.style.display = visible === 0 ? 'block' : 'none';
}

initDisplayPrefs();
load();
</script>
</body>
</html>
